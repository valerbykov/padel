<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no: в нативном WKWebView пинч-зум «залипал»
         без кнопки сброса (iOS). Для app-режима зум отключаем; авто-зум по инпутам
         уже не нужен (все поля 16px). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1612" />
    <!-- TLS-рукопожатие с БД начинается сразу, а не при первом запросе данных -->
    <link rel="preconnect" href="https://ofewhhcwswjxvlqsygxu.supabase.co" crossorigin />
    <link rel="preconnect" href="https://ru.padelpack.app" crossorigin />
    <!-- Шрифты самохостятся (см. /public/fonts): убирает render-blocking CSS с
         fonts.googleapis.com (из РФ ходит плохо). Outfit — вариативный (400–800).
         Кириллицы у Outfit/Anton нет и не было — русский, как и раньше, системным. -->
    <style>
      @font-face { font-family: 'Outfit'; font-style: normal; font-weight: 400 800; font-display: swap;
        src: url(/fonts/outfit-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
      @font-face { font-family: 'Anton'; font-style: normal; font-weight: 400; font-display: swap;
        src: url(/fonts/anton-latin.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
    </style>
    <link rel="preload" href="/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/anton-latin.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="PadelPack" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <title>PadelPack — падел с друзьями</title>
    <meta name="description" content="PadelPack — падел с друзьями: создавайте игры и турниры, приглашайте по ссылке, ведите счёт и следите за таблицей лиги." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PadelPack — падел с друзьями" />
    <meta property="og:description" content="Создавайте игры и турниры, приглашайте по ссылке, ведите счёт и следите за таблицей лиги." />
    <meta property="og:image" content="/logo-mark-dark.png" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
